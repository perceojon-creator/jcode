# MiniMax Custom Provider Configuration
# Uses the official OpenAI-compatible endpoint by default.
# Do not infer the China endpoint from the API key prefix.

[provider]
default_provider = "minimax-api"
default_model = "MiniMax-M2.7"

[providers.minimax-api]
type = "openai-compatible"
api_base = "https://api.minimax.io/v1"
auth = "bearer"
# The API key is stored in ~/.config/jcode/minimax.env
api_key_env = "MINIMAX_API_KEY"
env_file = "minimax.env"
default_model = "MiniMax-M2.7"
requires_api_key = true

[[providers.minimax-api.models]]
id = "MiniMax-M2.7"
context_window = 1000000
